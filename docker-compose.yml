services:

  gateway:
    build:
      context: ./gateway

    image: gateway:v1

    container_name: gateway

    ports:
      - "80:80"

    depends_on:
      - product-service
      - user-service
      - auth-service
      - cart-service
      - order-service
    networks:
      - cloudcart-network

  product-service:
    build:
      context: ./services/product-service

    image: product-service:v1

    container_name: product-service

    ports:
      - "3003:3003"

    env_file:
      - ./services/product-service/.env

    networks:
      - cloudcart-network

  user-service:
    build:
      context: ./services/user-service

    image: user-service:v1

    container_name: user-service

    ports:
      - "3004:3004"

    env_file:
      - ./services/user-service/.env

    networks:
      - cloudcart-network

  auth-service:
    build:
      context: ./services/auth-service

    image: auth-service:v1

    container_name: auth-service

    ports:
      - "3005:3005"

    env_file:
      - ./services/auth-service/.env

    networks:
      - cloudcart-network

  cart-service:
    build:
      context: ./services/cart-service

    image: cart-service:v1

    container_name: cart-service

    ports:
      - "3006:3006"

    env_file:
      - ./services/cart-service/.env

    networks:
      - cloudcart-network

  order-service:
    build:
      context: ./services/order-service

    image: order-service:v1

    container_name: order-service

    ports:
      - "3007:3007"

    env_file:
      - ./services/order-service/.env

    networks:
      - cloudcart-network

networks:
  cloudcart-network:
