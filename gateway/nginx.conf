events {}

http {

    upstream product_service {
        server product-service:3003;
    }

    upstream user_service {
        server user-service:3004;
    }

    upstream auth_service {
        server auth-service:3005;
    }

    server {

        listen 80;

        location /products {
            proxy_pass http://product_service/api/products;
        }

        location /users {
            proxy_pass http://user_service/api/users;
        }

        location /auth {
            proxy_pass http://auth_service/api/auth;
        }

        location / {
            return 200 "CloudCart Gateway Running";
        }

    }
}